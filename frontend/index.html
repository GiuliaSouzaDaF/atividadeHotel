<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Hotel</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Hotel Floripa</h1>

<form id="formLogin">

<input
type="email"
name="email"
placeholder="Digite seu email"
required
>

type="password"

required
>

<button type="submit">
Entrar
</button>

</form>

<p id="mensagemErro"></p>

</div>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
